# ============================================================
# Pet definitions
#
# id          : unique pet id stored in item NBT
# name        : display name (supports & color codes)
# material    : item material for pet token
# entity      : Bukkit EntityType to spawn
# health      : pet base health
# damage      : pet attack damage (-1 = no attack)
# speed       : pet movement speed
# attack-mobs : whether pet is aggressive
# revival     : whether pet revives after death
# baby        : spawn as baby form (if Ageable)
# attributes  : bonus attributes added to player
#               keys: strength, intellect, spirit, vitality, stamina
# lore        : item lore
# ============================================================

