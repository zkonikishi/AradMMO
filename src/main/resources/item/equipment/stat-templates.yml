# ══════════════════════════════════════════════════════════
#  Arad MMO — 装备属性模板
#  通过命令 /am item give <玩家> <模板ID> 给予
# ══════════════════════════════════════════════════════════
#
# 支持的属性键（连字符或下划线均可，不区分大小写）：
#   phys-atk    物理攻击       magic-atk   魔法攻击
#   atk-speed   攻击速度%      crit-chance 暴击率%
#   crit-dmg    暴击伤害%      life-steal  生命吸取%
#   phys-def    物理防御       magic-def   魔法防御
#   toughness   护甲韧性
#   max-hp      最大生命       max-mp      最大魔力
#   move-speed  移动速度%      cast-speed  技能冷却缩减%
#   strength    力量加成       intellect   智力加成
#   spirit      精神加成       vitality    体力加成
#
# rarity 可选值：COMMON UNCOMMON RARE UNIQUE LEGENDARY EPIC MYTHIC PRIMEVAL
# grade  可选值：INFERIOR WEAK ORDINARY EXCEPTIONAL SUPERIOR（留空则随机）
# arad-group 可选值：EQUIPMENT CONSUMABLE MATERIAL QUEST AVATAR TITLE CREATURE OTHER
# arad-category 可选值：WEAPON ARMOR ACCESSORY SPECIAL NONE
# arad-part 可选值：WEAPON HELMET CHESTPLATE LEGGINGS BOOTS BELT TITLE NECKLACE BRACELET RING
#                   SUB_EQUIPMENT EARRING MAGIC_STONE PET MOUNT OTHER
# arad-source 可选值：WEAPONS ARMOR ACCESSORIES SPECIAL_EQUIPMENT TITLES EQUIPMENT_FUSION OTHER
# arad-tags: 自定义分类标签列表，可用于后续商店/掉落/图鉴过滤
# arad-armor-type 可选值：CLOTH LEATHER LIGHT HEAVY PLATE（防具模板建议配置）
# arad-set-id: 防具套装ID（同ID件数可触发 armor/system.yml 中的套装加成）

# ── T1 武器 ────────────────────────────────────────────────

iron-sword-t1:
  material: IRON_SWORD
  name: "铁制短剑"
  required-level: 1
  arad-group: EQUIPMENT
  arad-category: WEAPON
  arad-part: WEAPON
  arad-source: WEAPONS
  arad-tags: [starter, common]
  rarity: COMMON
  stats:
    phys-atk: 50.0
    crit-chance: 2.0
    max-hp: 100.0
  lore:
    - "&8一把锻造精良的铁剑。"

