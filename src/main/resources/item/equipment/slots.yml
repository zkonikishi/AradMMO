  # ── 功能行 (第5行, 槽位 45-53) ──────────────────────────────

  pet:
    type: PET
    slot: 45
    holder:
      item: BONE
      name: "&a&l宠物槽"
      lore:
        - "&6&o放置宠物物品"

  backpack:
