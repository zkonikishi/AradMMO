  info:
    type: INFO
    slot: 49
    holder:
      item: BOOK
      name: "&a&l角色属性"
      lore:
        - "&c❤ 生命: &7%hp_current% &8/ &7%hp_max%"
        - "&b✦ 魔力: &7%mp_current% &8/ &7%mp_max%"
        - "&e⚡ 耐力: &7%st_current% &8/ &7%st_max%"
        - "&f等级: &7%level%"

  craft:
