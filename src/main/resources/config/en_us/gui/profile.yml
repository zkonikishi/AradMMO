      - '<gray>Available: <white>%skill_points%'
      - '<dark_gray>Click → Skill Menu'

  nav-class-btn:
    slots: [46]
    item: COMPASS
    function: nav-class
    name: '<aqua>Class Menu'
    lore:
      - '<dark_gray>Click to switch'

  nav-skills-btn:
    slots: [47]
    item: ENCHANTING_TABLE
    function: nav-skills
    name: '<aqua>Skill Menu'
    lore:
      - '<dark_gray>Click to switch'

  nav-attr-btn:
    slots: [48]
    item: REDSTONE
    function: nav-attributes
    name: '<red>Attribute Menu'
    lore:
      - '<dark_gray>Click to allocate attributes'
