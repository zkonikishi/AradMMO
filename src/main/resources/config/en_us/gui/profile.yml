title: '<gold><bold>Arad MMO</bold></gold> <gray>— %player_name%'
rows: 6

dynamic:
  attributes-start: 19
  elements-start: 28
  skills-start: 37
  skills-max: 8

items:
  filler:
    # Row 0 (minus head at slot 4), side columns, empty interior, row 5 (minus nav buttons)
    slots: [0,1,2,3,5,6,7,8,9,16,17,18,23,24,25,26,27,32,33,34,35,36,44,45,49,50,51,52,53]
    item: GRAY_STAINED_GLASS_PANE
    name: ' '

  player-head:
    slots: [4]
    function: player-head

  level:
    slots: [10]
    item: EXPERIENCE_BOTTLE
    function: level
    name: '<aqua>Level / Experience'
    lore:
      - '<gray>Level: <white>%level%'
      - '<gray>Experience: <white>%exp% / %max_exp%'

  balance:
    slots: [11]
    item: GOLD_INGOT
    function: balance
    name: '<gold>Gold'
    lore:
      - '<gray>Balance: <white>%balance%'

  vip:
    slots: [12]
    item: NETHER_STAR
    function: vip
    name: '<light_purple>VIP Tier'
    lore:
      - '<gray>Current: <white>%vip%'

  nav-class:
    slots: [13]
    item: DIAMOND_SWORD
    function: nav-class
    name: '<green>Class'
    lore:
      - '<gray>Current: <white>%class%'
      - '<dark_gray>Click → Class Menu'

  nav-attributes:
    slots: [14]
    item: REDSTONE
    function: nav-attributes
    name: '<red>Stat Points'
    lore:
      - '<gray>Available: <white>%stat_points%'
      - '<dark_gray>Click → Attribute Menu'

  nav-skills:
    slots: [15]
    item: BLAZE_POWDER
    function: nav-skills
    name: '<yellow>Skill Points'
