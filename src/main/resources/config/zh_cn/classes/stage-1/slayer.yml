# ─────────────────────────────────────────
# 职业定义: 鬼剑士 (slayer)
# ─────────────────────────────────────────

# 职业唯一 ID（通常无需修改）
id: slayer

# 游戏内显示名称（支持中英文）
display: "鬼剑士"

# 性别限制: any | male | female
gender: male

# 职业阶段: 0=冒险家 1=初始职业 2=转职
stage: 1

# 解锁所需等级
requires-level: 10

# 前置职业 ID（冒险家为空）
parent: adventurer

# 战斗风格 (balanced/melee/ranged/magic/tank/assassin)
combat-style: melee

# 防具精通（可选）: CLOTH | LEATHER | LIGHT | HEAVY | PLATE
armor-mastery: HEAVY

# 是否为外传职业（外传职业在满足条件时自动解锁，不显示于转职菜单）
external: false

# 基础属性（初始值，玩家可通过属性点追加）
base-attributes:
  strength:  9
  spirit:   7
  intellect: 3
  vitality:  9

# 默认显示皮肤
# 可填: steve | alex | 皮肤站玩家名 | url:https://... | base64:eyJ...
default-skin: steve
