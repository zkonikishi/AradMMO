    equip: '<yellow>/am equip [debug armor [玩家]]</yellow> <gray>- 打开装备界面或查看防具件数/套装/精通调试信息</gray>'
  reload:
    done: '<green>Arad MMO 已完成重载。</green>'
  lang:
    current: '<gray>当前语言:</gray> <aqua>%locale%</aqua>'
  profile:
    header: '<gold>%player% 的资料</gold>'
    level: '<gray>等级:</gray> <aqua>%value%</aqua>'
    exp: '<gray>经验:</gray> <aqua>%value%</aqua><gray>/</gray><aqua>%needed%</aqua>'
    balance: '<gray>金币:</gray> <gold>%value%</gold>'
    vip: '<gray>VIP:</gray> <light_purple>%value%</light_purple>'
    class: '<gray>职业:</gray> <green>%value%</green>'
    points: '<gray>可用点数:</gray> <yellow>属性 %stat%</yellow> <gray>/</gray> <yellow>技能 %skill%</yellow>'
  addxp:
    done: '<green>已为 %player% 添加 %value% 经验，当前等级 %level%。</green>'
    level-up: '<gold>%player% 本次提升了 %value% 级，获得 %stat% 属性点与 %skill% 技能点。</gold>'
  money:
    done: '<green>已执行 %mode% 操作，%player% 当前金币为 %value%。</green>'
  vip:
    done: '<green>已将 %player% 的 VIP 设置为 %value%。</green>'
  class:
    done: '<green>已将 %player% 的职业设置为 %value%，并重置成长分配。</green>'
    advance-done: '<gold>%player% 已转职为 %value%！</gold>'
    locked: '<yellow>需要 %level% 级才能解锁该职业路线。</yellow>'
  stats:
    header: '<gold>%player% 的属性</gold>'
    points: '<gray>剩余属性点:</gray> <yellow>%value%</yellow>'
    entry: '<gray>%attribute%:</gray> <aqua>%value%</aqua>'
  stat:
    done: '<green>%player% 的 %attribute% 已提升至 %value%，剩余属性点 %points%。</green>'
  resetstats:
    done: '<green>已重置 %player% 的属性，退还属性点，当前剩余 %points% 点。</green>'
  skills:
    header: '<gold>%player% 的技能树</gold>'
    points: '<gray>剩余技能点:</gray> <yellow>%value%</yellow>'
    empty: '<gray>当前尚未学习任何技能。</gray>'
    entry: '<gray>%skill%:</gray> <aqua>%value%</aqua><gray>/</gray><aqua>%cap%</aqua>'
  skill:
    done: '<green>%player% 的技能 %skill% 已提升至 %value%，剩余技能点 %points%。</green>'
  cast:
    done: '<aqua>技能</aqua> <yellow>%skill%</yellow> <aqua>已激活！</aqua>'
  gender:
    done: '<green>已将角色性别设置为 %value%。</green>'
    done-admin: '<green>已将 %player% 的性别设置为 %value%。</green>'
    already-set: '<red>性别已设置，无法再次更改。如需修改请联系管理员。</red>'
  element:
    done: '<green>已将 %player% 的 %element% %mode% 设置为 %value%。</green>'
  top:
    header: '<gold>排行榜 — %mode%</gold>'
    entry: '<gray>#%rank% <white>%player% <yellow>%value%</yellow></gray>'
  pet:
    learn-done: '<green>宠物技能学习成功: %value%</green>'
    mode-done: '<green>宠物行为模式已切换为: %value%</green>'
    give-done: '<green>已给予 %player% 宠物道具: %value%</green>'
  equip:
    debug:
      header: '<gold>[装备调试] %player%</gold>'
      profile: '<gray>职业键:</gray> <aqua>%archetype%</aqua> <gray>精通:</gray> <yellow>%mastery%</yellow> <gray>enabled:</gray> <white>%enabled%</white> <gray>strict:</gray> <white>%strict%</white>'
      passive-skill: '<gray>精通被动:</gray> <white>stage=%stage%</white> <white>level=%level%</white> <white>x%multiplier%</white>'
      counts: '<gray>件数:</gray> <white>total=%total%</white> <white>mastered=%mastered%</white> <white>mismatch=%mismatch%</white>'
      types: '<gray>类型件数:</gray> <white>%value%</white>'
      sets: '<gray>套装件数:</gray> <white>%value%</white>'
      type-bonuses: '<gray>类型加成:</gray> <white>%value%</white>'
      set-bonuses: '<gray>套装加成:</gray> <white>%value%</white>'
      mastery-bonuses: '<gray>精通加成:</gray> <white>%value%</white>'
      mastery-type-bonuses: '<gray>精通分型加成:</gray> <white>%value%</white>'
      mismatch-penalties: '<gray>混穿惩罚:</gray> <white>%value%</white>'
  vipcolor:
    name.done: '<green>已设置渐变名字颜色: %value%</green>'
    chat.done: '<green>已设置渐变聊天颜色: %value%</green>'
    both.done: '<green>已设置名字与聊天渐变颜色: %value%</green>'
  chat:
    reloaded: '<green>聊天子系统配置已重载。</green>'
    on: '<green>聊天接收已开启。</green>'
    off: '<yellow>聊天接收已关闭。</yellow>'
    route-status: '<aqua>当前跨服聊天路由:</aqua> <gray>group=</gray><yellow>%group%</yellow> <gray>server=</gray><yellow>%server%</yellow> <gray>targets=</gray><yellow>%targets%</yellow>'
    route-list-header: '<aqua>可用跨服聊天路由组:</aqua>'
    route-list-entry: '<gray>- </gray><yellow>%group%</yellow>%flags%<gray>: </gray><white>%targets%</white>'
    route-list-empty: '<yellow>当前没有可用的跨服聊天路由组。</yellow>'
    route-set: '<green>跨服聊天路由组已切换为: %value%</green>'
    route-cleared: '<yellow>跨服聊天路由组覆盖已清除，恢复使用配置文件设置。</yellow>'
    route-saved: '<green>跨服聊天路由组已保存到配置: %value%</green>'

