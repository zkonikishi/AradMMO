command:
  help:
    header: '<gold>Arad MMO 命令帮助</gold>'
    help: '<yellow>/am help</yellow> <gray>- 查看命令帮助</gray>'
    reload: '<yellow>/am reload</yellow> <gray>- 重载配置与语言文件</gray>'
    lang: '<yellow>/am lang</yellow> <gray>- 查看当前语言</gray>'
    profile: '<yellow>/am profile [玩家]</yellow> <gray>- 查看角色资料</gray>'
    addxp: '<yellow>/am addxp <玩家> <数值></yellow> <gray>- 添加经验</gray>'
    money: '<yellow>/am money <set|add|take> <玩家> <数值></yellow> <gray>- 管理金币</gray>'
    vip: '<yellow>/am vip <玩家> <等级></yellow> <gray>- 设置 VIP 等级</gray>'
    class: '<yellow>/am class <玩家> <职业></yellow> <gray>- 设置职业并重置成长分配</gray>'
    stats: '<yellow>/am stats [玩家]</yellow> <gray>- 查看属性与剩余属性点</gray>'
    stat: '<yellow>/am stat <玩家> <属性> <数值></yellow> <gray>- 分配属性点</gray>'
    resetstats: '<yellow>/am resetstats <玩家></yellow> <gray>- 重置属性分配并退还点数</gray>'
    skills: '<yellow>/am skills [玩家]</yellow> <gray>- 查看技能树</gray>'
    skill: '<yellow>/am skill <玩家> <技能> <数值></yellow> <gray>- 分配技能点</gray>'
    cast: '<yellow>/am cast <技能></yellow> <gray>- 主动释放技能</gray>'
    menu: '<yellow>/am menu</yellow> <gray>- 打开角色菜单</gray>'
    pet: '<yellow>/am pet <info|skills|learn|mode|give></yellow> <gray>- 宠物信息/技能GUI/行为模式/学习/发放</gray>'
    top: '<yellow>/am top [level|balance]</yellow> <gray>- 查看排行榜</gray>'
    gender: '<yellow>/am gender [玩家] <male|female></yellow> <gray>- 设置角色性别</gray>'
    element: '<yellow>/am element <玩家> <attack|resist> <元素> <数值></yellow> <gray>- 设置元素强化/抗性</gray>'
