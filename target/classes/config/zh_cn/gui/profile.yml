    function: player-head

  level:
    slots: [10]
    item: EXPERIENCE_BOTTLE
    function: level
    name: '<aqua>等级 / 经验'
    lore:
      - '<gray>等级: <white>%level%'
      - '<gray>经验: <white>%exp% / %max_exp%'

  balance:
    slots: [11]
    item: GOLD_INGOT
    function: balance
    name: '<gold>金币'
    lore:
      - '<gray>余额: <white>%balance%'

  vip:
    slots: [12]
    item: NETHER_STAR
    function: vip
    name: '<light_purple>VIP 等级'
