  nav-skills:
    slots: [15]
    item: BLAZE_POWDER
    function: nav-skills
    name: '<yellow>技能点'
    lore:
      - '<gray>可用: <white>%skill_points%'
      - '<dark_gray>点击 → 技能菜单'

  nav-class-btn:
    slots: [46]
    item: COMPASS
    function: nav-class
    name: '<aqua>职业菜单'
    lore:
      - '<dark_gray>点击切换'

  nav-skills-btn:
    slots: [47]
    item: ENCHANTING_TABLE
    function: nav-skills
    name: '<aqua>技能菜单'
    lore:
      - '<dark_gray>点击切换'

  nav-attr-btn:
    slots: [48]
    item: REDSTONE
    function: nav-attributes
    name: '<red>属性菜单'
    lore:
      - '<dark_gray>点击分配属性'
