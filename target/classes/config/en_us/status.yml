# -----------------------------------------------------------------------------
# Arad MMO — Status Effect Definitions
#
# Each entry key is a status ID in lowercase kebab-case.
# Common fields:
#   display            Display name shown in game (MiniMessage)
#   icon               GUI / ActionBar icon (Bukkit Material)
#   effect-type        crowd-control | dot | debuff | buff
#   default-duration   Default duration in ticks (20 ticks = 1 second)
#   break-on-damage    Whether the effect breaks when the target takes damage
#   stackable          Whether the effect can stack
#   max-stacks         Maximum stack count for stackable effects
#
# Crowd-control fields:
#   movement           Lock movement using extreme slowness
#   actions            Lock actions using extreme mining fatigue
#
# DoT fields:
#   damage-type        fire | physical | magic | true
#   base-damage        Damage dealt each tick
#   tick-interval      Tick interval between damage pulses
#
# Debuff / buff fields:
#   potion-effect      Bukkit PotionEffectType name
#   potion-amplifier   Potion level (0 = I, 1 = II, ...)
#
# Optional particle fields:
#   particle           Bukkit Particle name
#   particle-count     Spawn count per pulse
# -----------------------------------------------------------------------------

# ========== Crowd Control ==========

stun:
  display: '<gray>✦ Stun</gray>'
  icon: BARRIER
  effect-type: crowd-control
  default-duration: 60        # 3 seconds
  break-on-damage: false
  stackable: false
  movement: true
  actions: true
  particle: SMOKE_NORMAL
  particle-count: 4

